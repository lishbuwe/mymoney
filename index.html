<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小账本">
<meta name="theme-color" content="#F7F3EE">
<title>小账本</title>

<link rel="apple-touch-icon" href="/mymoney/lulu-wallet.png?v=2">
<link rel="apple-touch-icon-precomposed" href="/mymoney/lulu-wallet.png?v=2">
<link rel="icon" href="/mymoney/lulu-wallet.png?v=2">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;
    min-height:100%;
    background:#F7F3EE;
    color:#1A1A2E;
    font-family:'Sora',-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  :root{
    --bg:#F7F3EE;--card:#FFFFFF;--income:#00A878;--expense:#FF5252;
    --primary:#5B5FED;--text:#1A1A2E;--sub:#8B8BA7;--border:#EDE9E3;
    --shadow:0 2px 14px rgba(26,26,46,0.07);
  }
</style>
</head>
<style>
  body{font-family:'Sora',sans-serif;background:var(--bg);min-height:100dvh;max-width:430px;margin:0 auto;overflow-x:hidden;}
  ::-webkit-scrollbar{display:none;}
  button{cursor:pointer;border:none;background:none;font-family:inherit;}
  button:active{opacity:0.75;}
  input{outline:none;border:none;font-family:inherit;}
  .screen{display:none;padding-bottom:90px;}
  .screen.active{display:block;}
  .card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);}
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;}
  .nav-btn{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;}
  .nav-icon{font-size:20px;opacity:0.35;transition:opacity .2s;}
  .nav-label{font-size:10px;color:var(--sub);font-weight:400;transition:color .2s;}
  .nav-btn.active .nav-icon{opacity:1;}
  .nav-btn.active .nav-label{color:var(--primary);font-weight:700;}
  .screen-header{padding:52px 16px 12px;}
  .tag-chip{font-size:10px;padding:1px 6px;background:rgba(91,95,237,0.12);color:var(--primary);border-radius:10px;display:inline-block;margin:1px;}
  .divider{height:1px;background:var(--border);margin:0 16px;}
  .flash{animation:flashGreen .8s ease;}
  @keyframes flashGreen{0%,100%{background:var(--expense)}50%{background:var(--income)}}
  .progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px;}
  .progress-fill{height:100%;border-radius:4px;transition:width .6s ease;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-body{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:430px;}
  .toggle-track{width:44px;height:26px;border-radius:13px;background:var(--border);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;}
  .toggle-track.on{background:var(--primary);}
  .toggle-thumb{width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  .toggle-track.on .toggle-thumb{left:21px;}
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--income);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ========== HOME ========== -->
<div id="screen-home" class="screen active">
  <div id="home-header" style="padding:52px 20px 14px;">
    <div id="home-date" style="font-size:12px;color:var(--sub);margin-bottom:4px;letter-spacing:.3px;"></div>
    <div style="display:flex;gap:16px;">
      <span id="today-inc" style="font-size:13px;font-weight:500;color:var(--income);">↑ ¥0.00</span>
      <span id="today-exp" style="font-size:13px;font-weight:500;color:var(--expense);">↓ ¥0.00</span>
      <span id="today-bal" style="font-size:13px;color:var(--sub);">余 ¥0.00</span>
    </div>
  </div>
  <div style="padding:0 16px 24px;">
    <!-- Type toggle -->
    <div style="display:flex;background:var(--card);border-radius:14px;padding:4px;margin-bottom:14px;box-shadow:var(--shadow);">
      <button id="btn-expense" onclick="setType('expense')" style="flex:1;padding:10px;border-radius:10px;background:var(--expense);color:#fff;font-weight:600;font-size:14px;font-family:Sora;transition:all .2s;">支出</button>
      <button id="btn-income"  onclick="setType('income')"  style="flex:1;padding:10px;border-radius:10px;background:transparent;color:var(--sub);font-weight:600;font-size:14px;font-family:Sora;transition:all .2s;">收入</button>
    </div>
    <!-- Amount display -->
    <div class="card" style="margin-bottom:14px;padding:14px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <div id="sel-cat-label" style="font-size:12px;color:var(--sub);margin-bottom:4px;">🍜 餐饮</div>
          <div id="amount-display" style="font-size:38px;font-weight:700;color:var(--border);letter-spacing:-1px;font-variant-numeric:tabular-nums;">0.00</div>
        </div>
        <button onclick="clearAmount()" style="margin-top:4px;font-size:12px;color:var(--sub);background:var(--bg);padding:4px 10px;border-radius:8px;">清除</button>
      </div>
    </div>
    <!-- Category grid -->
    <div id="cat-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;"></div>
    <!-- Extra toggle -->
    <button onclick="toggleExtra()" id="extra-toggle" style="color:var(--sub);font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:4px;">▼ 添加备注 / 标签</button>
    <div id="extra-area" style="display:none;flex-direction:column;gap:8px;margin-bottom:12px;">
      <input id="inp-note" placeholder="备注（可选）" style="padding:10px 14px;border-radius:10px;background:var(--card);font-size:14px;color:var(--text);box-shadow:var(--shadow);">
      <input id="inp-tags" placeholder="标签，空格分隔（如 旅游 报销）" style="padding:10px 14px;border-radius:10px;background:var(--card);font-size:14px;color:var(--text);box-shadow:var(--shadow);">
    </div>
    <!-- Numpad -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;" id="numpad"></div>
    <!-- Record button -->
    <button id="record-btn" onclick="recordTxn()" style="width:100%;padding:16px;border-radius:16px;background:var(--expense);color:#fff;font-size:16px;font-weight:700;font-family:Sora;box-shadow:0 6px 20px rgba(255,82,82,.35);transition:all .25s;">记一笔</button>
  </div>
</div>

<!-- ========== DETAIL ========== -->
<div id="screen-detail" class="screen">
  <div style="padding:52px 16px 12px;position:sticky;top:0;background:var(--bg);z-index:10;">
    <input id="detail-search" oninput="renderDetail()" placeholder="🔍  搜索分类、备注、金额..." style="width:100%;padding:11px 16px;border-radius:12px;background:var(--card);font-size:14px;color:var(--text);box-shadow:var(--shadow);margin-bottom:10px;">
    <div style="display:flex;gap:8px;">
      <button onclick="setDetailFilter('all')"     id="df-all"     style="padding:6px 14px;border-radius:20px;background:var(--primary);color:#fff;font-size:12px;font-weight:600;font-family:Sora;box-shadow:none;transition:all .15s;">全部</button>
      <button onclick="setDetailFilter('expense')" id="df-expense" style="padding:6px 14px;border-radius:20px;background:var(--card);color:var(--sub);font-size:12px;font-weight:600;font-family:Sora;box-shadow:var(--shadow);transition:all .15s;">支出</button>
      <button onclick="setDetailFilter('income')"  id="df-income"  style="padding:6px 14px;border-radius:20px;background:var(--card);color:var(--sub);font-size:12px;font-weight:600;font-family:Sora;box-shadow:var(--shadow);transition:all .15s;">收入</button>
    </div>
  </div>
  <div id="detail-list" style="padding:0 16px;"></div>
</div>

<!-- ========== STATS ========== -->
<div id="screen-stats" class="screen">
  <div style="padding:52px 16px 0;">
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button onclick="setPeriod('week')"  id="sp-week"  style="flex:1;padding:10px;border-radius:12px;background:var(--card);color:var(--sub);font-weight:600;font-size:13px;font-family:Sora;box-shadow:var(--shadow);transition:all .2s;">本周</button>
      <button onclick="setPeriod('month')" id="sp-month" style="flex:1;padding:10px;border-radius:12px;background:var(--primary);color:#fff;font-weight:600;font-size:13px;font-family:Sora;transition:all .2s;">本月</button>
      <button onclick="setPeriod('year')"  id="sp-year"  style="flex:1;padding:10px;border-radius:12px;background:var(--card);color:var(--sub);font-weight:600;font-size:13px;font-family:Sora;box-shadow:var(--shadow);transition:all .2s;">今年</button>
    </div>
    <div id="stats-summary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;"></div>
    <div class="card" style="margin-bottom:16px;" id="pie-card">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;">支出构成</div>
      <canvas id="pie-chart" height="180"></canvas>
      <div id="pie-legend" style="display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;"></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;">近6月收支趋势</div>
      <canvas id="bar-chart" height="140"></canvas>
      <div style="display:flex;gap:16px;margin-top:8px;justify-content:center;">
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;"><div style="width:8px;height:8px;border-radius:4px;background:var(--income);"></div><span style="color:var(--sub);">收入</span></div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;"><div style="width:8px;height:8px;border-radius:4px;background:var(--expense);"></div><span style="color:var(--sub);">支出</span></div>
      </div>
    </div>
    <div class="card" id="compare-card" style="margin-bottom:16px;display:none;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;">环比上月</div>
      <div id="compare-content" style="display:flex;gap:10px;"></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;">✨ 月度财务小结</div>
      <div id="ai-text" style="font-size:13px;color:var(--sub);line-height:1.8;margin-bottom:12px;">AI 将根据你本月的账单数据，生成个性化的财务总结与建议。</div>
      <button onclick="genSummary()" id="ai-btn" style="width:100%;padding:12px;border-radius:12px;background:var(--primary);color:#fff;font-weight:600;font-size:13px;font-family:Sora;">生成小结</button>
    </div>
  </div>
</div>

<!-- ========== BUDGET ========== -->
<div id="screen-budget" class="screen">
  <div style="padding:52px 16px 0;">
    <div style="margin-bottom:16px;">
      <div id="budget-title" style="font-size:18px;font-weight:700;color:var(--text);"></div>
      <div id="budget-total" style="font-size:13px;color:var(--sub);margin-top:4px;"></div>
    </div>
    <div id="budget-list"></div>
  </div>
</div>

<!-- ========== SETTINGS ========== -->
<div id="screen-settings" class="screen">
  <div style="padding:52px 16px 0;">
    <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:24px;">设置</div>
    <div id="settings-msg" style="display:none;padding:12px 16px;background:rgba(0,168,120,.12);color:var(--income);border-radius:12px;margin-bottom:16px;font-size:13px;font-weight:500;"></div>
    <div class="card" style="margin-bottom:14px;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;">数据管理</div>
      <button onclick="exportCSV()" style="width:100%;padding:14px;border-radius:12px;background:var(--income);color:#fff;font-weight:600;font-size:14px;font-family:Sora;margin-bottom:10px;">📥 导出 CSV</button>
      <button onclick="document.getElementById('file-input').click()" style="width:100%;padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-weight:600;font-size:14px;font-family:Sora;margin-bottom:14px;">📤 导入 CSV</button>
      <input id="file-input" type="file" accept=".csv" style="display:none;" onchange="importCSV(this)">
      <div style="font-size:12px;color:var(--sub);line-height:1.8;background:var(--bg);padding:10px 14px;border-radius:10px;">
        <strong style="color:var(--text);">导入格式：</strong>CSV 需含列 id, date, type, category, amount, note, tags<br>
        type 为 <code>expense</code> 或 <code>income</code>，相同 id 的记录不会重复导入
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;">危险操作</div>
      <button onclick="clearAll()" style="width:100%;padding:14px;border-radius:12px;background:#FFF0F0;color:var(--expense);font-weight:600;font-size:14px;font-family:Sora;">🗑️ 清空所有数据</button>
    </div>
    <div id="settings-count" style="text-align:center;color:var(--sub);font-size:11px;line-height:2;">所有数据仅存储在本地，不会上传至任何服务器</div>
  </div>
</div>

<!-- ========== NAV ========== -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goTab('home')"     id="nav-home">     <span class="nav-icon">✏️</span><span class="nav-label">记账</span></button>
  <button class="nav-btn"        onclick="goTab('detail')"   id="nav-detail">   <span class="nav-icon">📋</span><span class="nav-label">明细</span></button>
  <button class="nav-btn"        onclick="goTab('stats')"    id="nav-stats">    <span class="nav-icon">📊</span><span class="nav-label">统计</span></button>
  <button class="nav-btn"        onclick="goTab('budget')"   id="nav-budget">   <span class="nav-icon">🎯</span><span class="nav-label">预算</span></button>
  <button class="nav-btn"        onclick="goTab('settings')" id="nav-settings"> <span class="nav-icon">⚙️</span><span class="nav-label">设置</span></button>
</nav>

<!-- Budget Modal -->
<div class="modal-overlay" id="budget-modal" onclick="closeBudgetModal()">
  <div class="modal-body" onclick="event.stopPropagation()">
    <div id="modal-title" style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;"></div>
    <div style="margin-bottom:14px;">
      <div style="font-size:12px;color:var(--sub);margin-bottom:6px;">月度预算金额（元）</div>
      <input id="modal-amount" type="number" placeholder="输入金额，留空则删除预算" style="width:100%;padding:12px 14px;border-radius:10px;background:var(--bg);font-size:16px;color:var(--text);">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:12px 14px;background:var(--bg);border-radius:12px;">
      <div>
        <div style="font-size:14px;font-weight:500;color:var(--text);">🎯 目标存钱模式</div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px;">每月结余自动累积，追踪储蓄进度</div>
      </div>
      <div class="toggle-track" id="goal-toggle" onclick="toggleGoalMode()"><div class="toggle-thumb"></div></div>
    </div>
    <div id="goal-target-area" style="display:none;margin-bottom:22px;">
      <div style="font-size:12px;color:var(--sub);margin-bottom:6px;">目标金额（元）</div>
      <input id="modal-goal" type="number" placeholder="如 5000" style="width:100%;padding:12px 14px;border-radius:10px;background:var(--bg);font-size:16px;color:var(--text);">
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeBudgetModal()" style="flex:1;padding:14px;border-radius:12px;background:var(--border);color:var(--sub);font-weight:600;font-family:Sora;">取消</button>
      <button onclick="saveBudget()" style="flex:2;padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-family:Sora;">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== DATA ====================
const EXPENSE_CATS = [
  {id:'food',          name:'餐饮', icon:'🍜', color:'#FF7675'},
  {id:'transport',     name:'交通', icon:'🚌', color:'#74B9FF'},
  {id:'shopping',      name:'购物', icon:'🛍️', color:'#FD79A8'},
  {id:'entertainment', name:'娱乐', icon:'🎮', color:'#A29BFE'},
  {id:'medical',       name:'医疗', icon:'💊', color:'#00CEC9'},
  {id:'education',     name:'教育', icon:'📚', color:'#FDCB6E'},
  {id:'housing',       name:'居住', icon:'🏠', color:'#6C5CE7'},
  {id:'travel',        name:'旅游', icon:'✈️', color:'#55EFC4'},
  {id:'other',         name:'其他', icon:'📦', color:'#B2BEC3'},
];
const INCOME_CATS = [
  {id:'salary',     name:'工资', icon:'💼', color:'#00B894'},
  {id:'freelance',  name:'副业', icon:'💻', color:'#0984E3'},
  {id:'investment', name:'投资', icon:'📈', color:'#6C5CE7'},
  {id:'gift',       name:'礼金', icon:'🎁', color:'#E17055'},
  {id:'other',      name:'其他', icon:'✨', color:'#FDCB6E'},
];

let transactions = [];
let budgets      = {};
let currentType  = 'expense';
let currentCat   = 'food';
let amountStr    = '';
let detailFilter = 'all';
let statsPeriod  = 'month';
let editingCatId = null;
let goalMode     = false;
let confirmDelId = null;
let pieChart     = null;
let barChart     = null;

// ==================== HELPERS ====================
const today  = () => new Date().toISOString().slice(0,10);
const nowYM  = () => new Date().toISOString().slice(0,7);
const fmtAmt = n => Math.abs(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});

function fmtDate(ds){
  const d=new Date(ds+'T00:00:00'), t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.round((t-d)/86400000);
  if(diff===0)return'今天'; if(diff===1)return'昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function getCat(type,id){
  return (type==='expense'?EXPENSE_CATS:INCOME_CATS).find(c=>c.id===id)||{name:id,icon:'?',color:'#ccc'};
}
function shiftMonth(ym,delta){
  const[y,m]=ym.split('-').map(Number),d=new Date(y,m-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getLastNMonths(n){
  const now=new Date();
  return Array.from({length:n},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(n-1-i),1);
    return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
}
function uid(){return`${Date.now()}_${Math.random().toString(36).slice(2)}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ==================== STORAGE ====================
function save(){
  try{localStorage.setItem('txns',JSON.stringify(transactions));localStorage.setItem('budgets',JSON.stringify(budgets));}catch(e){}
}
function load(){
  try{
    const t=localStorage.getItem('txns'),b=localStorage.getItem('budgets');
    transactions = t ? JSON.parse(t) : makeSample();
    budgets      = b ? JSON.parse(b) : {};
  }catch{transactions=makeSample();budgets={};}
}

function makeSample(){
  const ym=nowYM(),pym=shiftMonth(ym,-1);
  const d=new Date().getDate(),dd=String(d).padStart(2,'0'),d1=String(Math.max(1,d-1)).padStart(2,'0');
  return[
    {id:'s1', date:`${ym}-${dd}`, type:'expense',category:'food',        amount:38.5, note:'午饭',  tags:[]},
    {id:'s2', date:`${ym}-${d1}`, type:'expense',category:'transport',   amount:18,   note:'',      tags:[]},
    {id:'s3', date:`${ym}-05`,    type:'income', category:'salary',      amount:8000, note:'工资',  tags:[]},
    {id:'s4', date:`${ym}-04`,    type:'expense',category:'shopping',    amount:245.8,note:'换衣服',tags:[]},
    {id:'s5', date:`${ym}-03`,    type:'expense',category:'food',        amount:67.5, note:'聚餐',  tags:[]},
    {id:'s6', date:`${ym}-02`,    type:'expense',category:'housing',     amount:2000, note:'房租',  tags:[]},
    {id:'s7', date:`${pym}-28`,   type:'expense',category:'entertainment',amount:88,  note:'电影',  tags:[]},
    {id:'s8', date:`${pym}-15`,   type:'income', category:'salary',      amount:8000, note:'工资',  tags:[]},

function renderNumpad(){
  const keys=['1','2','3','4','5','6','7','8','9','.','0','⌫'];
  document.getElementById('numpad').innerHTML=keys.map(k=>`
    <button onclick="numKey('${k}')" style="padding:15px 8px;border-radius:14px;background:${k==='⌫'?'#FFF0F0':'var(--card)'};color:${k==='⌫'?'var(--expense)':'var(--text)'};font-size:20px;font-weight:600;font-family:Sora;box-shadow:var(--shadow);transition:opacity .1s;line-height:1;">${k}</button>`).join('');
}

function numKey(k){
  if(k==='⌫'){amountStr=amountStr.slice(0,-1);}
  else if(k==='.'&&amountStr.includes('.'))return;
  else if(k==='.'&&!amountStr){amountStr='0.';}
  else if(amountStr==='0'&&k!=='.'){amountStr=k;}
  else if(amountStr.includes('.')&&amountStr.split('.')[1].length>=2)return;
  else if(amountStr.replace('.','').length>=7)return;
  else amountStr+=k;
  updateAmountDisplay();
}

function clearAmount(){amountStr='';updateAmountDisplay();}

function updateAmountDisplay(){
  const el=document.getElementById('amount-display');
  el.textContent=amountStr||'0.00';
  el.style.color=amountStr?'var(--text)':'var(--border)';
}

function recordTxn(){

  const note=document.getElementById('inp-note').value.trim();
  const tagStr=document.getElementById('inp-tags').value.trim();
  transactions.unshift({id:uid(),date:today(),type:currentType,category:currentCat,amount:n,note,tags:tagStr?tagStr.split(/\s+/).filter(Boolean):[]});
  save();
  amountStr='';
  document.getElementById('inp-note').value='';
  document.getElementById('inp-tags').value='';

function updateHomeHeader(){
  const todayStr=today();

  document.getElementById('today-exp').textContent=`↓ ¥${fmtAmt(exp)}`;

}

    return cat.name.includes(search)||(t.note||'').toLowerCase().includes(search)||String(t.amount).includes(search)||(t.tags||[]).some(g=>g.toLowerCase().includes(search));
  });
  const grouped={};
  filtered.forEach(t=>{const d=t.date.slice(0,10);if(!grouped[d])grouped[d]=[];grouped[d].push(t);});

function setPeriod(p){
  statsPeriod=p;
  ['week','month','year'].forEach(x=>{
    const btn=document.getElementById('sp-'+x);
    if(x===p){btn.style.background='var(--primary)';btn.style.color='#fff';btn.style.boxShadow='none';}
    else{btn.style.background='var(--card)';btn.style.color='var(--sub)';btn.style.boxShadow='var(--shadow)';}
  });
  renderStats();
}

function getPeriodTxns(){
  const now=new Date(),ym=nowYM();
  return transactions.filter(t=>{
    if(statsPeriod==='week'){
      const d=new Date(t.date+'T00:00:00'),ws=new Date(now);
      ws.setDate(now.getDate()-((now.getDay()+6)%7));ws.setHours(0,0,0,0);return d>=ws;
    }
    if(statsPeriod==='month')return t.date.startsWith(ym);
    if(statsPeriod==='year')return t.date.startsWith(String(now.getFullYear()));
    return true;
  });
}

function renderStats(){
  const txns=getPeriodTxns();

  if(pieChart){pieChart.destroy();pieChart=null;}

    pieChart=new Chart(ctx,{type:'doughnut',data:{labels:pieData.map(d=>d.name),datasets:[{data:pieData.map(d=>d.value),backgroundColor:pieData.map(d=>d.color),borderWidth:2,borderColor:'#fff',hoverOffset:6}]},options:{responsive:true,cutout:'38%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`¥${fmtAmt(ctx.parsed)}`}}}}});
    document.getElementById('pie-legend').innerHTML=pieData.map(d=>`<div style="display:flex;align-items:center;gap:4px;font-size:11px;"><div style="width:8px;height:8px;border-radius:4px;background:${d.color};flex-shrink:0;"></div><span style="color:var(--sub);">${d.icon}${d.name}</span><span style="color:var(--text);font-weight:600;">¥${fmtAmt(d.value)}</span></div>`).join('');
  }else{
    document.getElementById('pie-card').style.display='block';
    document.getElementById('pie-legend').innerHTML='<div style="color:var(--sub);font-size:13px;padding:20px 0;width:100%;text-align:center;">该周期暂无支出</div>';
    document.getElementById('pie-chart').style.display='none';
  }
  // bar
  const months=getLastNMonths(6);
  const barLabels=months.map(m=>parseInt(m.slice(5))+'月');
  const incData=months.map(m=>transactions.filter(t=>t.date.startsWith(m)&&t.type==='income').reduce((s,t)=>s+t.amount,0));
  const expData=months.map(m=>transactions.filter(t=>t.date.startsWith(m)&&t.type==='expense').reduce((s,t)=>s+t.amount,0));
  if(barChart){barChart.destroy();barChart=null;}
  const bctx=document.getElementById('bar-chart').getContext('2d');
  barChart=new Chart(bctx,{type:'bar',data:{labels:barLabels,datasets:[{label:'收入',data:incData,backgroundColor:'#00A878',borderRadius:4,barThickness:11},{label:'支出',data:expData,backgroundColor:'#FF5252',borderRadius:4,barThickness:11}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`¥${fmtAmt(ctx.parsed.y)}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#8B8BA7'}},y:{display:false,grid:{display:false}}}}});
  // compare
  const ym=nowYM(),pym=shiftMonth(ym,-1);
  const pTxns=transactions.filter(t=>t.date.startsWith(pym));
  const pExp=pTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const pInc=pTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const cmpCard=document.getElementById('compare-card');
  if(statsPeriod==='month'&&(pExp>0||pInc>0)){
    cmpCard.style.display='block';
    const expChg=pExp>0?((expense-pExp)/pExp*100).toFixed(1):null;
    const incChg=pInc>0?((income-pInc)/pInc*100).toFixed(1):null;
    document.getElementById('compare-content').innerHTML=[['支出',expense,pExp,expChg,'var(--expense)'],['收入',income,pInc,incChg,'var(--income)']].map(([l,curr,prev,chg,color])=>`
      <div style="flex:1;padding:12px;background:var(--bg);border-radius:14px;">
        <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">${l}</div>
        <div style="font-size:17px;font-weight:700;color:${color};margin-bottom:4px;">¥${fmtAmt(curr)}</div>
        ${chg!==null?`<div style="font-size:11px;"><span style="color:${parseFloat(chg)>0?(l==='支出'?'var(--expense)':'var(--income)'):(l==='支出'?'var(--income)':'var(--expense)')}">${parseFloat(chg)>0?'↑':'↓'} ${Math.abs(parseFloat(chg))}%</span><span style="color:var(--sub);"> vs ¥${fmtAmt(prev)}</span></div>`:''}
      </div>`).join('');
  }else{cmpCard.style.display='none';}
}

async function genSummary(){
  const btn=document.getElementById('ai-btn');
  btn.textContent='生成中...';btn.disabled=true;btn.style.background='var(--border)';btn.style.color='var(--sub)';
  try{
    const ym=nowYM(),mTxns=transactions.filter(t=>t.date.startsWith(ym));
    const catMap={};
    mTxns.filter(t=>t.type==='expense').forEach(t=>{const c=getCat('expense',t.category);catMap[c.name]=(catMap[c.name]||0)+t.amount;});
    const mInc=mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const mExp=mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const topStr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}¥${v.toFixed(0)}`).join('、')||'暂无支出';
    const pym=shiftMonth(ym,-1),pTxns=transactions.filter(t=>t.date.startsWith(pym));
    const pExp=pTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const expChg=pExp>0?((mExp-pExp)/pExp*100).toFixed(1):null;
    const chgStr=expChg?`环比上月支出${parseFloat(expChg)>0?'多':'少'}了${Math.abs(parseFloat(expChg))}%。`:'';
    const prompt=`用户${ym}月账单：收入¥${mInc.toFixed(0)}，支出¥${mExp.toFixed(0)}，结余¥${(mInc-mExp).toFixed(0)}。主要支出：${topStr}。${chgStr}请用轻松温暖的中文写一段80字左右的月度财务小结，包含消费特点简评、一条具体建议、一句鼓励。直接输出自然段落，不用标题或符号。`;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'生成失败，请重试。';
    const aiEl=document.getElementById('ai-text');
    aiEl.textContent=text;aiEl.style.color='var(--text)';
    aiEl.style.cssText='font-size:13px;color:var(--text);line-height:1.9;margin-bottom:12px;padding:12px 14px;background:var(--bg);border-radius:12px;';
  }catch{document.getElementById('ai-text').textContent='生成失败，请检查网络后重试。';}
  btn.textContent='重新生成';btn.disabled=false;btn.style.background='var(--primary)';btn.style.color='#fff';
}

// ==================== BUDGET ====================
function getRollover(catId){
  const b=budgets[catId];if(!b?.amount)return 0;
  const ym=nowYM();
  const months=[...new Set(transactions.filter(t=>t.type==='expense'&&t.category===catId&&t.date.slice(0,7)<ym).map(t=>t.date.slice(0,7)))].sort();
  let rollover=0;
  for(const m of months){
    const spent=transactions.filter(t=>t.type==='expense'&&t.category===catId&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0);
    rollover=b.amount+rollover-spent;
  }
  return rollover;
}

function renderBudget(){
  const ym=nowYM();
  document.getElementById('budget-title').textContent=`${ym.slice(0,4)}年${parseInt(ym.slice(5))}月预算`;

  const rows=EXPENSE_CATS.map(cat=>{
    const b=budgets[cat.id];
    const spent=transactions.filter(t=>t.type==='expense'&&t.category===cat.id&&t.date.startsWith(ym)).reduce((s,t)=>s+t.amount,0);
    const rollover=getRollover(cat.id);
    const effective=b?Math.max(0,b.amount+rollover):0;
    const pct=effective>0?Math.min(100,spent/effective*100):0;
    const goalAcc=Math.max(0,rollover);
    const goalPct=b?.goalMode&&b?.goalTarget>0?Math.min(100,goalAcc/b.goalTarget*100):0;
    if(b)totalBudget+=b.amount;totalSpent+=spent;
    const barColor=pct>=100?'var(--expense)':pct>=80?'#FDCB6E':'var(--income)';
    return`<div class="card" style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${b?12:0}px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:38px;height:38px;border-radius:12px;background:${cat.color}22;display:flex;align-items:center;justify-content:center;font-size:20px;">${cat.icon}</div>
          <div>
            <div style="font-weight:600;font-size:14px;color:var(--text);">${cat.name}</div>
            <div style="font-size:11px;color:var(--sub);">${b?`¥${fmtAmt(b.amount)}/月`:'未设预算'}${b&&rollover!==0?`<span style="color:${rollover>0?'var(--income)':'var(--expense)'};margin-left:6px;">${rollover>0?`结转 +¥${fmtAmt(rollover)}`:`超支 -¥${fmtAmt(-rollover)}`}</span>`:''}</div>
          </div>
        </div>
        <button onclick="openBudgetModal('${cat.id}')" style="font-size:12px;color:var(--primary);font-weight:600;font-family:Sora;padding:5px 12px;border-radius:8px;background:rgba(91,95,237,.12);">${b?'编辑':'设置'}</button>
      </div>
      ${b?`
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor};"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);">
        <span>已用 ¥${fmtAmt(spent)}</span>
        <span style="color:${pct>=100?'var(--expense)':'var(--sub)'};">${pct>=100?`超支 ¥${fmtAmt(spent-effective)}`:`剩余 ¥${fmtAmt(effective-spent)}`}</span>
      </div>
      ${b.goalMode&&b.goalTarget>0?`
      <div style="margin-top:12px;padding:10px 12px;background:rgba(91,95,237,.06);border-radius:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:12px;color:var(--primary);font-weight:600;">🎯 储蓄目标</span>
          <span style="font-size:12px;color:var(--primary);">${goalPct.toFixed(0)}%</span>
        </div>
        <div style="height:6px;background:rgba(91,95,237,.18);border-radius:3px;overflow:hidden;margin-bottom:4px;">
          <div style="height:100%;width:${goalPct}%;background:var(--primary);border-radius:3px;transition:width .6s;"></div>
        </div>
        <div style="font-size:11px;color:var(--sub);">已积累 ¥${fmtAmt(goalAcc)} / 目标 ¥${fmtAmt(b.goalTarget)}</div>
      </div>`:''}
      `:''}
    </div>`;
  }).join('');
  document.getElementById('budget-list').innerHTML=rows;
  if(totalBudget>0){document.getElementById('budget-total').textContent=`已用 ¥${fmtAmt(totalSpent)} / 总预算 ¥${fmtAmt(totalBudget)}`;}
  else{document.getElementById('budget-total').textContent='';}
}

function openBudgetModal(catId){
  editingCatId=catId;
  const b=budgets[catId];
  const cat=getCat('expense',catId);
  document.getElementById('modal-title').textContent=`${cat.icon} ${cat.name} 预算`;
  document.getElementById('modal-amount').value=b?.amount||'';
  goalMode=b?.goalMode||false;
  document.getElementById('modal-goal').value=b?.goalTarget||'';
  const toggle=document.getElementById('goal-toggle');
  toggle.classList.toggle('on',goalMode);
  document.getElementById('goal-target-area').style.display=goalMode?'block':'none';
  document.getElementById('budget-modal').classList.add('open');
}
function closeBudgetModal(){document.getElementById('budget-modal').classList.remove('open');}
function toggleGoalMode(){
  goalMode=!goalMode;
  document.getElementById('goal-toggle').classList.toggle('on',goalMode);
  document.getElementById('goal-target-area').style.display=goalMode?'block':'none';
}
function saveBudget(){
  const amt=parseFloat(document.getElementById('modal-amount').value);
  if(!amt||amt<=0){delete budgets[editingCatId];}
  else{budgets[editingCatId]={amount:amt,goalMode,goalTarget:parseFloat(document.getElementById('modal-goal').value)||0};}
  save();closeBudgetModal();renderBudget();
}

// ==================== SETTINGS ====================
function renderSettings(){
  document.getElementById('settings-count').innerHTML=`所有数据仅存储在本地，不会上传至任何服务器<br>共 ${transactions.length} 条记录`;
}
function showSettingsMsg(m){
  const el=document.getElementById('settings-msg');
  el.textContent='✓ '+m;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}
function exportCSV(){
  const header='id,date,type,category,amount,note,tags';
  const rows=transactions.map(t=>`${t.id},${t.date},${t.type},${t.category},${t.amount},"${(t.note||'').replace(/"/g,'""')}","${(t.tags||[]).join(' ')}"`);
  const blob=new Blob(['\uFEFF'+[header,...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`账单_${nowYM()}.csv`;a.click();URL.revokeObjectURL(url);
  showSettingsMsg(`已导出 ${transactions.length} 条记录`);
}
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
      const hdr=lines[0].split(','),idx=k=>hdr.indexOf(k);
      function parseLine(line){
        const parts=[];let cur='',inQ=false;
        for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){parts.push(cur);cur='';}else{cur+=ch;}}
        parts.push(cur);return parts;
      }
      const imported=lines.slice(1).map(l=>{const p=parseLine(l);return{id:p[idx('id')]||uid(),date:p[idx('date')],type:p[idx('type')],category:p[idx('category')],amount:parseFloat(p[idx('amount')])||0,note:p[idx('note')]||'',tags:p[idx('tags')]?p[idx('tags')].trim().split(/\s+/).filter(Boolean):[]};}).filter(t=>t.date&&t.type&&t.amount>0);
      const ex=new Set(transactions.map(t=>t.id));
      const newOnes=imported.filter(t=>!ex.has(t.id));
      transactions=[...newOnes,...transactions].sort((a,b)=>b.date.localeCompare(a.date));
      save();showSettingsMsg(`成功导入 ${imported.length} 条记录`);renderSettings();
    }catch{showSettingsMsg('导入失败，请检查文件格式');}
  };
  reader.readAsText(file,'UTF-8');
  input.value='';
}
function clearAll(){
  if(confirm('确定清空全部数据？此操作无法撤销。')){
    transactions=[];save();showSettingsMsg('数据已清空');renderSettings();
  }
}

// ==================== INIT ====================
load();
renderCatGrid();
renderNumpad();
updateHomeHeader();
</script>
